versions:
  image: "1.0.0"
  promote: "1.0"

namespace: employee-leave

backend:
  name: employee-leave-backend
  image: ghcr.io/pascariucosmin93/employee-leave-backend
  tag: "1.0.0"
  replicaCount: 2
  port: 5000
  servicePortName: http
  secretName: employee-leave-secrets
  selectorLabel: backend
  strategy:
    type: RollingUpdate
  env:
    - name: PORT
      value: "5000"
    - name: GUNICORN_WORKERS
      value: "2"
    - name: GUNICORN_TIMEOUT
      value: "60"
    - name: METRICS_REFRESH_INTERVAL_SECONDS
      value: "30"
    - name: LEADER_ELECTION_ENABLED
      value: "false"
    - name: LEASE_NAME
      value: ""
    - name: LEASE_TTL_SECONDS
      value: ""
    - name: GUNICORN_WORKER_CLASS
      value: "sync"
    - name: GUNICORN_THREADS
      value: "2"
    - name: METRICS_PRIMARY
      value: "1"
    - name: DB_POOL_SIZE
      value: "8"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  probes:
    startup:
      httpGet:
        path: /api/healthz
        port: 5000
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 10
      failureThreshold: 24
    liveness:
      httpGet:
        path: /api/healthz
        port: 5000
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 5
    readiness:
      httpGet:
        path: /api/healthz
        port: 5000
      initialDelaySeconds: 40
      periodSeconds: 10
      timeoutSeconds: 10
      failureThreshold: 6
  serviceAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "5000"
    prometheus.io/path: "/metrics"
  serviceMonitor:
    enabled: true
    name: ""
    namespace: monitoring
    releaseLabel: monitoring
    interval: 10s
    path: /metrics
    portName: ""
    additionalLabels: {}
  legacyService:
    enabled: false
    name: ""
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  serviceAccountName: default

frontend:
  image: ghcr.io/pascariucosmin93/employee-leave-frontend
  tag: "1.0.0"
  replicaCount: 2
  port: 80
  service:
    type: LoadBalancer
    annotations: {}
    loadBalancerIP: ""
    externalTrafficPolicy: Cluster
  strategy:
    type: RollingUpdate
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

imagePullSecrets:
  - name: ghcr-pull-secret

# Prometheus (kube-prometheus-stack) wiring for external scrape configs
kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      additionalScrapeConfigs:
        name: external-scrape-config
        key: additional-scrape-configs.yaml
        optional: false

# Blackbox SSL probe configuration
blackbox:
  enabled: false
  namespace: monitoring
  service:
    name: blackbox-exporter-prometheus-blackbox-exporter
    port: 9115
    portName: http
  module: http_2xx
  targets:
    - http://10.30.10.11
  scrapeInterval: 1m
  releaseLabel: prometheus
