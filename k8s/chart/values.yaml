versions:
  image: "1.1.9"
  promote: "1.1"

namespace: employee-leave

backend:
  name: employee-leave-backend
  image: ghcr.io/pascariucosmin93/employee-leave-backend
  tag: "1.1.9"
  replicaCount: 2
  port: 5000
  servicePortName: http
  secretName: employee-leave-secrets
  adminSecretName: employee-leave-admin-secret
  selectorLabel: backend
  strategy:
    type: RollingUpdate
  env:
    - name: PORT
      value: "5000"
    - name: GUNICORN_WORKERS
      value: "2"
    - name: GUNICORN_TIMEOUT
      value: "60"
    - name: METRICS_REFRESH_INTERVAL_SECONDS
      value: "30"
    - name: LEADER_ELECTION_ENABLED
      value: "false"
    - name: LEASE_NAME
      value: ""
    - name: LEASE_TTL_SECONDS
      value: ""
    - name: GUNICORN_WORKER_CLASS
      value: "sync"
    - name: GUNICORN_THREADS
      value: "2"
    - name: POSTGRES_HOST
      valueFrom:
        secretKeyRef:
          name: employee-leave-secrets
          key: POSTGRES_HOST
    - name: POSTGRES_PORT
      valueFrom:
        secretKeyRef:
          name: employee-leave-secrets
          key: POSTGRES_PORT
    - name: POSTGRES_DB
      valueFrom:
        secretKeyRef:
          name: employee-leave-secrets
          key: POSTGRES_DB
    - name: POSTGRES_USER
      valueFrom:
        secretKeyRef:
          name: employee-leave-secrets
          key: POSTGRES_USER
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: employee-leave-secrets
          key: POSTGRES_PASSWORD
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: employee-leave-secrets
          key: DATABASE_URL
    - name: BOOTSTRAP_DB
      valueFrom:
        secretKeyRef:
          name: employee-leave-secrets
          key: BOOTSTRAP_DB
    - name: BOOTSTRAP_POSTGRES_HOST
      valueFrom:
        secretKeyRef:
          name: employee-leave-secrets
          key: BOOTSTRAP_POSTGRES_HOST
    - name: BOOTSTRAP_POSTGRES_PORT
      valueFrom:
        secretKeyRef:
          name: employee-leave-secrets
          key: BOOTSTRAP_POSTGRES_PORT
    - name: BOOTSTRAP_POSTGRES_ADMIN_DB
      valueFrom:
        secretKeyRef:
          name: employee-leave-secrets
          key: BOOTSTRAP_POSTGRES_ADMIN_DB
    - name: BOOTSTRAP_POSTGRES_ADMIN_USER
      valueFrom:
        secretKeyRef:
          name: employee-leave-secrets
          key: BOOTSTRAP_POSTGRES_ADMIN_USER
    - name: BOOTSTRAP_POSTGRES_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: employee-leave-secrets
          key: BOOTSTRAP_POSTGRES_ADMIN_PASSWORD
    - name: RESET_PASSWORD_BASE_URL
      valueFrom:
        secretKeyRef:
          name: employee-leave-secrets
          key: RESET_PASSWORD_BASE_URL
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  probes:
    startup:
      httpGet:
        path: /api/healthz/live
        port: 5000
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 10
      failureThreshold: 24
    liveness:
      httpGet:
        path: /api/healthz/live
        port: 5000
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 5
    readiness:
      httpGet:
        path: /api/healthz/ready
        port: 5000
      initialDelaySeconds: 40
      periodSeconds: 10
      timeoutSeconds: 10
      failureThreshold: 6
  serviceAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "5000"
    prometheus.io/path: "/metrics"
  serviceMonitor:
    enabled: false
    name: ""
    namespace: monitoring
    releaseLabel: monitoring
    interval: 10s
    path: /metrics
    portName: ""
    additionalLabels: {}
  legacyService:
    enabled: false
    name: ""
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  serviceAccountName: default

frontend:
  image: ghcr.io/pascariucosmin93/employee-leave-frontend
  tag: "1.1.9"
  replicaCount: 2
  port: 8080
  servicePort: 80
  service:
    type: LoadBalancer
    annotations: {}
    loadBalancerIP: ""
    externalTrafficPolicy: Cluster
  strategy:
    type: RollingUpdate
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

imagePullSecrets:
  - name: ghcr-pull-secret

secrets:
  postgresHost: "postgres.postgress.svc.cluster.local"
  postgresPort: "5432"
  postgresDatabase: "concedii"
  postgresUser: "concedii"
  postgresPassword: "concedii"
  databaseUrl: "postgresql+psycopg://concedii:concedii@postgres.postgress.svc.cluster.local:5432/concedii"
  bootstrapDb: "true"
  bootstrapPostgresHost: "postgres.postgress.svc.cluster.local"
  bootstrapPostgresPort: "5432"
  bootstrapPostgresAdminDb: "postgres"
  bootstrapPostgresAdminUser: "devops"
  bootstrapPostgresAdminPassword: "gaz"
  resetPasswordBaseUrl: "http://employee-leave.local/reset.html"

# Prometheus (kube-prometheus-stack) wiring for external scrape configs
kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      additionalScrapeConfigs:
        name: external-scrape-config
        key: additional-scrape-configs.yaml
        optional: false

# Blackbox SSL probe configuration
blackbox:
  enabled: false
  namespace: monitoring
  service:
    name: blackbox-exporter-prometheus-blackbox-exporter
    port: 9115
    portName: http
  module: http_2xx
  targets:
    - http://10.30.10.11
  scrapeInterval: 1m
  releaseLabel: prometheus
